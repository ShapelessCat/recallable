name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # Optional: enable caching for dependencies
          cache-key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose

      - name: Check format
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --verbose

      - name: Run clippy with all features
        run: cargo clippy --workspace --all-targets --all-features --verbose

      - name: Run tests with default features (support serde)
        run: cargo test --verbose --package recallable

      - name: Run default-feature examples
        run: |
          cargo run --verbose --package recallable --example basic_model
          cargo run --verbose --package recallable --example nested_generic
          cargo run --verbose --package recallable --example postcard_roundtrip

      - name: Run tests without default feature
        run: cargo test --verbose --package recallable --no-default-features

      - name: Run example without default features
        run: cargo run --verbose --package recallable --no-default-features --example manual_no_serde

      - name: cargo test with feature impl_from
        run: cargo test --verbose --package recallable --features impl_from

      - name: Run impl_from example without default features
        run: cargo run --verbose --package recallable --no-default-features --features impl_from --example impl_from_roundtrip

      - name: Run tests with all features
        run: cargo test --verbose --package recallable --all-features

      - name: Check examples with all features
        run: cargo check --verbose --package recallable --examples --all-features

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust 1.88.0 toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.88.0
          cache-key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}

      - name: Build with MSRV
        run: cargo build --verbose

      - name: Run tests with default features (support serde)
        run: cargo test --verbose --package recallable

      - name: Run default-feature examples
        run: |
          cargo run --verbose --package recallable --example basic_model
          cargo run --verbose --package recallable --example nested_generic
          cargo run --verbose --package recallable --example postcard_roundtrip

      - name: Run tests without default feature
        run: cargo test --verbose --package recallable --no-default-features

      - name: Run example without default features
        run: cargo run --verbose --package recallable --no-default-features --example manual_no_serde

      - name: Run tests with feature impl_from
        run: cargo test --verbose --package recallable --features impl_from

      - name: Run impl_from example without default features
        run: cargo run --verbose --package recallable --no-default-features --features impl_from --example impl_from_roundtrip

      - name: Run tests with all features
        run: cargo test --verbose --package recallable --all-features

      - name: Check examples with all features
        run: cargo check --verbose --package recallable --examples --all-features

  coverage-report:
    runs-on: ubuntu-latest
    outputs:
      current_function_coverage: ${{ steps.coverage-metrics.outputs.current_function_coverage }}
      current_line_coverage: ${{ steps.coverage-metrics.outputs.current_line_coverage }}
      current_region_coverage: ${{ steps.coverage-metrics.outputs.current_region_coverage }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools-preview
          cache-key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run merged coverage test matrix
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov --workspace --no-default-features --tests --no-report
          cargo llvm-cov --workspace --tests --no-report
          cargo llvm-cov --workspace --features impl_from --tests --no-report
          cargo llvm-cov --workspace --all-features --tests --no-report

      - name: Generate HTML and JSON reports
        run: |
          cargo llvm-cov report --html --output-dir target/llvm-cov
          cargo llvm-cov report --json --summary-only --output-path target/llvm-cov/summary.json

      - name: Capture current coverage metrics
        id: coverage-metrics
        run: |
          CURRENT_FUNCTION_COVERAGE=$(jq -r '.data[0].totals.functions.percent' target/llvm-cov/summary.json)
          CURRENT_LINE_COVERAGE=$(jq -r '.data[0].totals.lines.percent' target/llvm-cov/summary.json)
          CURRENT_REGION_COVERAGE=$(jq -r '.data[0].totals.regions.percent' target/llvm-cov/summary.json)
          {
            echo "current_function_coverage=${CURRENT_FUNCTION_COVERAGE}"
            echo "current_line_coverage=${CURRENT_LINE_COVERAGE}"
            echo "current_region_coverage=${CURRENT_REGION_COVERAGE}"
          } >> "${GITHUB_OUTPUT}"
          {
            echo "## Coverage Report"
            echo ""
            echo "Current total function coverage: ${CURRENT_FUNCTION_COVERAGE}%"
            echo ""
            echo "Current total line coverage: ${CURRENT_LINE_COVERAGE}%"
            echo ""
            echo "Current total region coverage: ${CURRENT_REGION_COVERAGE}%"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Prepare coverage summary artifact
        run: |
          mkdir -p target/coverage-summary
          cp target/llvm-cov/summary.json target/coverage-summary/summary.json

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: target/llvm-cov/html
          if-no-files-found: error
          retention-days: 14

      - name: Upload coverage summary artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-summary
          path: target/coverage-summary
          if-no-files-found: error
          retention-days: 14

  coverage-compare:
    runs-on: ubuntu-latest
    needs: coverage-report
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools-preview
          cache-key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Compare current coverage against base
        env:
          CURRENT_FUNCTION_COVERAGE: ${{ needs.coverage-report.outputs.current_function_coverage }}
          CURRENT_LINE_COVERAGE: ${{ needs.coverage-report.outputs.current_line_coverage }}
          CURRENT_REGION_COVERAGE: ${{ needs.coverage-report.outputs.current_region_coverage }}
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA_PR: ${{ github.event.pull_request.base.sha }}
          BASE_SHA_PUSH: ${{ github.event.before }}
        run: ./.github/scripts/compare-coverage.sh
